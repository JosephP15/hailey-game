<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hailey's Learning Farm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Comic Sans MS','Segoe UI',sans-serif;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;background:#a8edea}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
#app{width:100%;height:100%;position:relative}
.screen{display:none;width:100%;height:100%;flex-direction:column;align-items:center;padding:8px;overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex}

/* HOME */
#home-screen{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);justify-content:flex-start;padding-top:4px;gap:4px}
.home-title{font-size:clamp(20px,3.8vw,34px);color:#2c3e50;text-shadow:2px 2px 0 rgba(255,255,255,0.5)}
.animal-parade{font-size:clamp(18px,3vw,28px);animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.section-label{font-size:clamp(11px,1.8vw,14px);color:#888;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:640px;width:100%;padding:0 6px}
#creative-grid{grid-template-columns:repeat(2,1fr);max-width:320px}
.mode-btn{background:#fff;border:3px solid #ddd;border-radius:12px;padding:6px 3px;font-size:clamp(10px,1.8vw,14px);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;
  box-shadow:0 2px 8px rgba(0,0,0,0.07);transition:transform 0.15s;font-family:inherit;min-height:0}
.mode-btn:active{transform:scale(0.93)}
.mode-icon{font-size:clamp(22px,3.5vw,32px)}
.home-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:3px}
.diff-group{display:flex;gap:3px}
.diff-btn{padding:5px 10px;border-radius:8px;border:2px solid #3498db;background:#fff;
  font-family:inherit;font-size:clamp(11px,1.8vw,14px);cursor:pointer;transition:background 0.15s,color 0.15s}
.diff-btn:active,.diff-btn.selected{background:#3498db;color:#fff}

/* GAME */
#game-screen{justify-content:flex-start;padding-top:4px;transition:background 0.5s}
.game-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;padding:3px 10px}
#game-prompt{font-size:clamp(20px,3.8vw,34px);color:#2c3e50;font-weight:bold;text-align:center;margin:4px 0;line-height:1.2}
#game-display{font-size:clamp(50px,12vw,110px);text-align:center;margin:0;min-height:40px;
  display:flex;align-items:center;justify-content:center;flex-shrink:1}
.choices-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:550px;width:100%;
  padding:8px 12px;margin-top:auto;margin-bottom:8px;flex-shrink:0}
.choices-grid.cols3{grid-template-columns:repeat(3,1fr)}
.choice-btn{background:#fff;border:4px solid #e0e0e0;border-radius:18px;padding:14px 8px;
  font-size:clamp(16px,3.2vw,28px);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;box-shadow:0 3px 10px rgba(0,0,0,0.08);
  transition:transform 0.12s,border-color 0.2s,background 0.2s;min-height:85px;font-family:inherit}
.choice-btn:active{transform:scale(0.94)}
.choice-btn.correct{border-color:#27ae60;background:#d5f5e3;animation:correctPop 0.5s ease}
.choice-btn.wrong{animation:shake 0.4s ease}
.choice-btn.c3{padding:8px 4px;min-height:65px}
@keyframes correctPop{0%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(0.96)}100%{transform:scale(1.04)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* CELEBRATION TEXT */
#celebration-text{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(36px,8vw,68px);font-weight:bold;color:#e74c3c;
  text-shadow:2px 2px 4px rgba(0,0,0,0.15);pointer-events:none;opacity:0;z-index:999}
#celebration-text.show{animation:celebPop 1.5s ease forwards}
@keyframes celebPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}
  25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-65%) scale(1.1)}}

#score-display{font-size:clamp(14px,2.5vw,22px);color:#f39c12;font-weight:bold}
#timer-display{font-size:clamp(12px,2.2vw,18px);color:#8e44ad;font-weight:bold}
.icon-btn{background:rgba(255,255,255,0.7);border:none;border-radius:10px;padding:5px 10px;
  font-size:clamp(12px,2vw,16px);cursor:pointer;font-family:inherit}
.icon-btn:active{background:rgba(255,255,255,0.95)}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;z-index:2000}
.modal-content{background:#fff;border-radius:20px;padding:25px;max-width:360px;width:90%;text-align:center;position:relative}
.modal-content h2{margin-bottom:15px;color:#2c3e50}
.timer-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.timer-opt{padding:14px;font-size:18px;border:2px solid #3498db;border-radius:12px;background:#fff;
  cursor:pointer;font-family:inherit;transition:background 0.15s,color 0.15s}
.timer-opt:active,.timer-opt.selected{background:#3498db;color:#fff}
.modal-close{background:#e74c3c;color:#fff;border:none;border-radius:50%;width:36px;height:36px;
  font-size:18px;cursor:pointer;position:absolute;top:10px;right:10px}

/* TIMES UP */
#timesup-screen{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);justify-content:center;gap:15px}
#timesup-screen h1{font-size:clamp(32px,6vw,56px);color:#2c3e50}
.timesup-animals{font-size:clamp(36px,7vw,60px);animation:bounce 2s ease-in-out infinite}
#final-score{font-size:clamp(20px,4vw,32px);color:#e67e22}
.big-btn{background:#27ae60;color:#fff;border:none;border-radius:18px;padding:16px 32px;
  font-size:clamp(18px,3.5vw,28px);cursor:pointer;box-shadow:0 4px 12px rgba(39,174,96,0.3);font-family:inherit}
.big-btn:active{transform:scale(0.95)}

.floater{position:fixed;pointer-events:none;opacity:0.12;z-index:-1;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg)}100%{transform:translateY(-80px) rotate(360deg)}}

.color-swatch{width:clamp(50px,11vw,75px);height:clamp(50px,11vw,75px);border-radius:50%;margin:0 auto 2px;box-shadow:0 3px 10px rgba(0,0,0,0.15)}
.color-swatch-big{width:clamp(70px,15vw,110px);height:clamp(70px,15vw,110px);border-radius:50%;box-shadow:0 4px 16px rgba(0,0,0,0.12)}

/* FAMILY */
.fam-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.fam-big{width:clamp(70px,15vw,110px);height:clamp(70px,15vw,110px);font-size:clamp(36px,8vw,56px)}
.fam-sm{width:clamp(40px,9vw,60px);height:clamp(40px,9vw,60px);font-size:clamp(22px,5vw,34px);margin:0 auto}

.dad-letter{display:inline-block;font-size:clamp(22px,4vw,38px);margin:0 2px;font-weight:bold}
.dad-letter.done{color:#27ae60}.dad-letter.current{color:#e74c3c;text-decoration:underline}.dad-letter.pending{color:#bbb}

/* DRAW & COLOR */
#draw-screen,#coloring-screen{background:#f8f8f8;padding:4px}
.draw-header{display:flex;justify-content:space-between;align-items:center;width:100%;padding:3px 6px;gap:4px;flex-shrink:0}
.draw-header span{font-weight:bold;font-size:clamp(13px,2.3vw,18px);color:#2c3e50}
.canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden;border-radius:10px;border:2px solid #ddd;background:#fff}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
.draw-tools{width:100%;padding:4px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.palette{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.pal-btn{width:32px;height:32px;border-radius:50%;border:3px solid #ccc;cursor:pointer}
.pal-btn:active{transform:scale(0.9)}
.pal-btn.active{border-color:#333;box-shadow:0 0 0 2px #333}
.brush-row{display:flex;gap:8px;justify-content:center;align-items:center}
.brush-btn{border-radius:50%;background:#333;border:3px solid #ccc;cursor:pointer}
.brush-btn.active{border-color:#FF6B6B}
.eraser-btn{width:32px;height:32px;border-radius:50%;border:3px solid #ccc;background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.eraser-btn.active{border-color:#333;box-shadow:0 0 0 2px #333}
.page-dots{display:flex;gap:5px;justify-content:center}
.page-dot{width:10px;height:10px;border-radius:50%;background:#ccc;cursor:pointer}
.page-dot.active{background:#3498db}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">

  <div id="home-screen" class="screen active">
    <div class="home-title">🌟 Hailey's Learning Farm 🌟</div>
    <div class="animal-parade">🐭 🐮 👸 🐀 🎨 🖌️</div>
    <div class="section-label">Learning Games</div>
    <div class="mode-grid" id="mode-grid"></div>
    <div class="section-label">Creative</div>
    <div class="mode-grid" id="creative-grid"></div>
    <div class="home-footer">
      <div class="diff-group">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn selected" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
      <button class="icon-btn" id="timer-btn">⏱️ Timer</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="icon-btn" id="back-btn">← Back</button>
      <span id="mode-title"></span>
      <span id="timer-display" style="display:none"></span>
      <span id="score-display">⭐ 0</span>
    </div>
    <div id="game-prompt"></div>
    <div id="game-display"></div>
    <div id="game-choices" class="choices-grid"></div>
  </div>

  <div id="draw-screen" class="screen">
    <div class="draw-header">
      <button class="icon-btn" id="draw-back">← Back</button>
      <span>Free Draw 🖌️</span>
      <button class="icon-btn" id="draw-undo">↩ Undo</button>
      <button class="icon-btn" id="draw-clear">🗑 Clear</button>
    </div>
    <div class="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    <div class="draw-tools">
      <div class="palette" id="draw-palette"></div>
      <div class="brush-row" id="brush-row"></div>
    </div>
  </div>

  <div id="coloring-screen" class="screen">
    <div class="draw-header">
      <button class="icon-btn" id="color-back">← Back</button>
      <span id="color-page-name">Heart</span>
      <button class="icon-btn" id="color-prev">◀</button>
      <button class="icon-btn" id="color-next">▶</button>
      <button class="icon-btn" id="color-clear">🗑</button>
    </div>
    <div class="canvas-wrap"><canvas id="color-canvas"></canvas></div>
    <div class="draw-tools">
      <div class="palette" id="color-palette"></div>
      <div class="page-dots" id="page-dots"></div>
    </div>
  </div>

  <div id="timesup-screen" class="screen">
    <h1>🌟 All Done! 🌟</h1>
    <div class="timesup-animals">🐭 🐮 🐷 🐔 🐴 🐑</div>
    <p style="font-size:clamp(22px,4vw,34px);color:#2c3e50">Great job today, Hailey!</p>
    <p id="final-score"></p>
    <button class="big-btn" id="play-again-btn">Play Again!</button>
  </div>

  <div id="timer-modal" class="modal" style="display:none">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">✕</button>
      <h2>⏱️ Set Timer</h2>
      <div class="timer-options">
        <button class="timer-opt" data-minutes="15">15 min</button>
        <button class="timer-opt" data-minutes="30">30 min</button>
        <button class="timer-opt" data-minutes="45">45 min</button>
        <button class="timer-opt selected" data-minutes="0">No limit</button>
      </div>
    </div>
  </div>
</div>
<div id="celebration-text"></div>

// ===== PRINCESS SVG =====
function pIcon(p,sz){
  const hair={
    long:`<ellipse cx="35" cy="25" rx="17" ry="13" fill="${p.hair}"/>
      <rect x="12" y="27" width="8" height="34" rx="3" fill="${p.hair}"/>
      <rect x="50" y="27" width="8" height="34" rx="3" fill="${p.hair}"/>`,
    braid1:`<ellipse cx="35" cy="25" rx="17" ry="13" fill="${p.hair}"/>
      <rect x="11" y="28" width="7" height="36" rx="2" fill="${p.hair}"/>
      <circle cx="14" cy="40" r="3" fill="${p.hair}" opacity="0.5"/>
      <circle cx="15" cy="50" r="3" fill="${p.hair}" opacity="0.5"/>`,
    braid2:`<ellipse cx="35" cy="25" rx="17" ry="13" fill="${p.hair}"/>
      <rect x="12" y="28" width="7" height="30" rx="2" fill="${p.hair}"/>
      <rect x="51" y="28" width="7" height="30" rx="2" fill="${p.hair}"/>`,
    short:`<ellipse cx="35" cy="23" rx="17" ry="14" fill="${p.hair}"/>

    curly:`<circle cx="20" cy="20" r="8" fill="${p.hair}"/>

      <circle cx="50" cy="20" r="8" fill="${p.hair}"/>

      <circle cx="12" cy="46" r="6" fill="${p.hair}"/>
      <circle cx="58" cy="46" r="6" fill="${p.hair}"/>`,
  };
  return `<svg viewBox="0 0 70 90" width="${sz}" style="display:block;margin:auto">
    ${hair[p.hs]}
    <path d="M22,40 L14,85 L56,85 L48,40 Z" fill="${p.dress}"/>

    <path d="M31,31 Q35,35 39,31" fill="none" stroke="#333" stroke-width="1.2"/>
    <text x="35" y="8" text-anchor="middle" font-size="12">${p.emoji}</text>
  </svg>`;
}

// ===== MODES =====

const CPAGES=[
  {name:'Heart ❤️',build(w,h){const cx=w/2,cy=h*.45,s=Math.min(w,h)*.35,p=new Path2D();
    p.moveTo(cx,cy+s);p.bezierCurveTo(cx-s*1.5,cy+s*.1,cx-s*1.2,cy-s*1.1,cx,cy-s*.2);
    p.bezierCurveTo(cx+s*1.2,cy-s*1.1,cx+s*1.5,cy+s*.1,cx,cy+s);return[{n:'h',path:p}];}},
  {name:'Star ⭐',build(w,h){const cx=w/2,cy=h*.45,s=Math.min(w,h)*.38,p=new Path2D();
    for(let i=0;i<5;i++){const oa=(i*72-90)*Math.PI/180,ia=((i*72+36)-90)*Math.PI/180;
      if(!i)p.moveTo(cx+s*Math.cos(oa),cy+s*Math.sin(oa));else p.lineTo(cx+s*Math.cos(oa),cy+s*Math.sin(oa));
      p.lineTo(cx+s*.4*Math.cos(ia),cy+s*.4*Math.sin(ia));}p.closePath();return[{n:'s',path:p}];}},
  {name:'House 🏠',build(w,h){const wl=new Path2D();wl.rect(w*.2,h*.42,w*.6,h*.42);
    const rf=new Path2D();rf.moveTo(w*.13,h*.42);rf.lineTo(w*.5,h*.12);rf.lineTo(w*.87,h*.42);rf.closePath();
    const dr=new Path2D();dr.rect(w*.42,h*.58,w*.16,h*.26);
    const w1=new Path2D();w1.rect(w*.26,h*.5,w*.11,h*.1);
    const w2=new Path2D();w2.rect(w*.63,h*.5,w*.11,h*.1);
    return[{n:'wl',path:wl},{n:'rf',path:rf},{n:'dr',path:dr},{n:'w1',path:w1},{n:'w2',path:w2}];}},
  {name:'Butterfly 🦋',build(w,h){const cx=w/2,cy=h*.45,s=Math.min(w,h)*.28;
    const bd=new Path2D();bd.ellipse(cx,cy,s*.12,s*.7,0,0,Math.PI*2);
    const wl=new Path2D();wl.ellipse(cx-s*.8,cy-s*.15,s*.65,s*.5,-.2,0,Math.PI*2);
    const wr=new Path2D();wr.ellipse(cx+s*.8,cy-s*.15,s*.65,s*.5,.2,0,Math.PI*2);
    const bl=new Path2D();bl.ellipse(cx-s*.6,cy+s*.55,s*.45,s*.35,-.15,0,Math.PI*2);
    const br=new Path2D();br.ellipse(cx+s*.6,cy+s*.55,s*.45,s*.35,.15,0,Math.PI*2);
    return[{n:'wl',path:wl},{n:'wr',path:wr},{n:'bl',path:bl},{n:'br',path:br},{n:'bd',path:bd}];}},
  {name:'Flower 🌸',build(w,h){const cx=w/2,cy=h*.38,s=Math.min(w,h)*.14,r=[];
    for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180,px=cx+s*2*Math.cos(a),py=cy+s*2*Math.sin(a),p=new Path2D();
      p.ellipse(px,py,s,s*.65,a+Math.PI/2,0,Math.PI*2);r.push({n:'p'+i,path:p});}
    const c=new Path2D();c.arc(cx,cy,s*.8,0,Math.PI*2);r.push({n:'c',path:c});
    const st=new Path2D();st.rect(cx-s*.2,cy+s*1.8,s*.4,h*.3);r.push({n:'st',path:st});return r;}},
  {name:'Fish 🐟',build(w,h){const cx=w*.42,cy=h*.45,s=Math.min(w,h)*.28;
    const bd=new Path2D();bd.ellipse(cx,cy,s*1.1,s*.7,0,0,Math.PI*2);
    const tl=new Path2D();tl.moveTo(cx+s*.9,cy);tl.lineTo(cx+s*1.7,cy-s*.6);tl.lineTo(cx+s*1.7,cy+s*.6);tl.closePath();
    const ey=new Path2D();ey.arc(cx-s*.4,cy-s*.15,s*.15,0,Math.PI*2);
    return[{n:'bd',path:bd},{n:'tl',path:tl},{n:'ey',path:ey}];}},
];

// ===== AUDIO =====
let actx=null;
function aCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,d,type='sine',vol=.25){try{const c=aCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=f;o.type=type;g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+d);
  o.start();o.stop(c.currentTime+d);}catch(e){}}
function playOk(){tone(523,.1);setTimeout(()=>tone(659,.1),80);setTimeout(()=>tone(784,.1),160);setTimeout(()=>tone(1047,.2),240);}
function playNo(){tone(200,.25,'triangle',.12);}
function say(t,r=.85,p=1.1){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.rate=r;u.pitch=p;window.speechSynthesis.speak(u);}

// ===== CONFETTI =====
function confetti(){const cv=document.getElementById('confetti-canvas'),cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const P=[],co=['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#F7DC6F','#BB8FCE','#85C1E9','#FF69B4'];
  for(let i=0;i<70;i++)P.push({x:cv.width/2+(Math.random()-.5)*cv.width*.5,y:cv.height*.38+(Math.random()-.5)*80,
    vx:(Math.random()-.5)*16,vy:-Math.random()*14-4,c:co[Math.floor(Math.random()*co.length)],
    sz:Math.random()*9+4,r:Math.random()*360,rv:(Math.random()-.5)*12});
  let f=0;(function go(){cx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.vx*=.99;p.r+=p.rv;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);cx.fillStyle=p.c;
      cx.globalAlpha=Math.max(0,1-f/90);cx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);cx.restore();});
    if(++f<90)requestAnimationFrame(go);else cx.clearRect(0,0,cv.width,cv.height);})();}

// ===== HELPERS =====
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function dist(a,t,n){n=Math.min(n,a.length-1);return shuffle(a.filter(x=>x!==t)).slice(0,n);}
function nextBg(){S.bgIdx=(S.bgIdx+1)%BACKGROUNDS.length;document.getElementById('game-screen').style.background=BACKGROUNDS[S.bgIdx];}

// ===== GAME LOGIC =====
function startMode(id){S.mode=id;S.score=0;S.streak=0;S.lastTarget=null;showScreen('game');
  if(S.timerMin>0&&!S.timerRunning)startTimer();if(id==='dad')nextDadAnimal();else nextRound();}

function startCreative(id){if(id==='freedraw')showScreen('draw');
  else if(id==='coloring'){S.colorPageIdx=0;S.regionFills={};showScreen('coloring');}
  if(S.timerMin>0&&!S.timerRunning)startTimer();}

function nextRound(){
  S.animating=false;nextBg();const nd=numDist(),M=S.mode;
  function pick1(arr){let t;do{t=pick(arr);}while(t===S.lastTarget&&arr.length>1);
    S.target=t;S.lastTarget=t;S.choices=shuffle([t,...dist(arr,t,nd)]);}
  if(M==='animals')pick1(ANIMALS);
  else if(M==='princesses')pick1(PRINCESSES);
  else if(M==='remy')pick1(FOODS);
  else if(M==='letters')pick1(LETTERS);
  else if(M==='colors')pick1(COLORS);
  else if(M==='words')pick1(WORDS);
  else if(M==='family')pick1(FAMILY);
  else if(M==='days')pick1(DAYS);
  else if(M==='months')pick1(MONTHS);
  else if(M==='numbers'){
    const em=pick(COUNT_EMOJIS),mx=S.difficulty==='hard'?9:5;
    let v;do{v=Math.floor(Math.random()*mx)+1;}while(S.lastTarget&&v===S.lastTarget.value);
    S.target={value:v,emoji:em};S.lastTarget=S.target;
    const all=[];for(let i=1;i<=mx;i++)all.push({value:i,emoji:em});
    S.choices=shuffle([S.target,...all.filter(n=>n.value!==v).slice(0,nd)]);
  }
  renderGame();
  setTimeout(()=>{
    if(M==='animals')say('Find the '+S.target.name);
    else if(M==='princesses')say('Find '+S.target.name);
    else if(M==='remy')say('Feed Remy some '+S.target.name);
    else if(M==='letters')say('Find the letter '+S.target);
    else if(M==='numbers')say('How many? Count them!');
    else if(M==='colors')say('Find '+S.target.name);
    else if(M==='words')say('What is '+S.target.word+'?');
    else if(M==='family')say('Find '+S.target.name);
    else if(M==='days')say('Find '+S.target);
    else if(M==='months')say('Find '+S.target);
  },350);
}

function handleChoice(i){
  if(S.animating)return;const ch=S.choices[i];
  let ok=S.mode==='numbers'?ch.value===S.target.value:ch===S.target;
  const btns=document.querySelectorAll('.choice-btn');
  if(ok){S.animating=true;S.score++;S.streak++;btns[i].classList.add('correct');playOk();confetti();
    const ph=pick(PHRASES);celebText(ph);document.getElementById('score-display').textContent='⭐ '+S.score;
    setTimeout(()=>say(ph.replace(/[^\w\s]/g,'')),350);
    setTimeout(()=>{if(S.mode==='dad')advanceDad();else nextRound();},1800);
  } else {S.streak=0;btns[i].classList.add('wrong');playNo();setTimeout(()=>btns[i].classList.remove('wrong'),450);}
}

function nextDadAnimal(){let a;do{a=pick(ANIMALS);}while(a===S.dadAnimal&&ANIMALS.length>1);
  S.dadAnimal=a;S.dadIdx=0;S.animating=false;nextBg();renderGame();
  setTimeout(()=>say("Let's spell "+a.name+'! Find the letter '+a.name[0].toUpperCase()),400);}
function advanceDad(){S.dadIdx++;const nm=S.dadAnimal.name.toUpperCase();
  if(S.dadIdx>=nm.length){S.animating=true;
    setTimeout(()=>{say('You spelled '+S.dadAnimal.name+'! Amazing!');setTimeout(()=>nextDadAnimal(),2200);},400);
  } else {S.animating=false;renderGame();setTimeout(()=>say('Find the letter '+nm[S.dadIdx]),300);}}

// ===== FREE DRAW =====
let dCv,dCx;
function resizeDrawCanvas(){dCv=document.getElementById('draw-canvas');dCx=dCv.getContext('2d');
  const r=dCv.parentElement.getBoundingClientRect();dCv.width=r.width;dCv.height=r.height;
  dCx.fillStyle='#FFF';dCx.fillRect(0,0,dCv.width,dCv.height);S.drawHistory=[];}
function initDraw(){
  const cv=document.getElementById('draw-canvas');
  cv.addEventListener('pointerdown',e=>{e.preventDefault();S.drawing=true;
    S.drawHistory.push(dCx.getImageData(0,0,dCv.width,dCv.height));if(S.drawHistory.length>30)S.drawHistory.shift();
    const r=cv.getBoundingClientRect();dCx.beginPath();dCx.moveTo(e.clientX-r.left,e.clientY-r.top);});
  cv.addEventListener('pointermove',e=>{if(!S.drawing)return;e.preventDefault();const r=cv.getBoundingClientRect();
    dCx.lineTo(e.clientX-r.left,e.clientY-r.top);dCx.strokeStyle=S.drawColor;dCx.lineWidth=S.brushSize;
    dCx.lineCap='round';dCx.lineJoin='round';dCx.stroke();});
  cv.addEventListener('pointerup',()=>{S.drawing=false;});
  cv.addEventListener('pointerleave',()=>{S.drawing=false;});
  const pal=document.getElementById('draw-palette');
  PALETTE_C.forEach((c,i)=>{const b=document.createElement('button');b.className='pal-btn'+(i===0?' active':'');
    b.style.background=c;if(c==='#FFFFFF')b.style.border='3px solid #999';
    b.addEventListener('pointerdown',e=>{e.preventDefault();S.drawColor=c;
      pal.querySelectorAll('.pal-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
      document.getElementById('eraser-btn')?.classList.remove('active');});pal.appendChild(b);});
  const eb=document.createElement('button');eb.className='eraser-btn';eb.id='eraser-btn';eb.textContent='🧽';
  eb.addEventListener('pointerdown',e=>{e.preventDefault();S.drawColor='#FFFFFF';
    pal.querySelectorAll('.pal-btn').forEach(x=>x.classList.remove('active'));eb.classList.add('active');});pal.appendChild(eb);
  const br=document.getElementById('brush-row');
  BRUSHES.forEach((b,i)=>{const btn=document.createElement('button');btn.className='brush-btn'+(i===1?' active':'');
    btn.style.width=b.w+'px';btn.style.height=b.w+'px';
    btn.addEventListener('pointerdown',e=>{e.preventDefault();S.brushSize=b.size;
      br.querySelectorAll('.brush-btn').forEach(x=>x.classList.remove('active'));btn.classList.add('active');});br.appendChild(btn);});
  document.getElementById('draw-undo').addEventListener('pointerdown',e=>{e.preventDefault();
    if(S.drawHistory.length)dCx.putImageData(S.drawHistory.pop(),0,0);});
  document.getElementById('draw-clear').addEventListener('pointerdown',e=>{e.preventDefault();
    S.drawHistory.push(dCx.getImageData(0,0,dCv.width,dCv.height));dCx.fillStyle='#FFF';dCx.fillRect(0,0,dCv.width,dCv.height);});
  document.getElementById('draw-back').addEventListener('pointerdown',e=>{e.preventDefault();showScreen('home');});
}

// ===== COLORING =====
let cCv,cCx;
function resizeColorCanvas(){cCv=document.getElementById('color-canvas');cCx=cCv.getContext('2d');
  const r=cCv.parentElement.getBoundingClientRect();cCv.width=r.width;cCv.height=r.height;}
function renderColorPage(){if(!cCv)return;const pg=CPAGES[S.colorPageIdx];
  document.getElementById('color-page-name').textContent=pg.name;
  const w=cCv.width,h=cCv.height;cCx.fillStyle='#FFF';cCx.fillRect(0,0,w,h);
  const rg=pg.build(w,h);
  rg.forEach(r=>{const k=S.colorPageIdx+'-'+r.n;if(S.regionFills[k]){cCx.fillStyle=S.regionFills[k];cCx.fill(r.path);}});
  rg.forEach(r=>{cCx.strokeStyle='#333';cCx.lineWidth=3;cCx.stroke(r.path);});
  document.querySelectorAll('.page-dot').forEach((d,i)=>d.classList.toggle('active',i===S.colorPageIdx));}
function initColoring(){
  const cv=document.getElementById('color-canvas');
  cv.addEventListener('pointerdown',e=>{e.preventDefault();const rc=cv.getBoundingClientRect();
    const x=e.clientX-rc.left,y=e.clientY-rc.top,pg=CPAGES[S.colorPageIdx],rg=pg.build(cCv.width,cCv.height);
    for(let i=rg.length-1;i>=0;i--){if(cCx.isPointInPath(rg[i].path,x,y)){
      S.regionFills[S.colorPageIdx+'-'+rg[i].n]=S.colorColor;renderColorPage();playOk();break;}}});
  const pal=document.getElementById('color-palette');
  PALETTE_C.slice(0,-1).forEach((c,i)=>{const b=document.createElement('button');b.className='pal-btn'+(i===0?' active':'');b.style.background=c;
    b.addEventListener('pointerdown',e=>{e.preventDefault();S.colorColor=c;
      pal.querySelectorAll('.pal-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');});pal.appendChild(b);});
  const dots=document.getElementById('page-dots');
  CPAGES.forEach((_,i)=>{const d=document.createElement('div');d.className='page-dot'+(i===0?' active':'');
    d.addEventListener('pointerdown',e=>{e.preventDefault();S.colorPageIdx=i;renderColorPage();});dots.appendChild(d);});
  document.getElementById('color-prev').addEventListener('pointerdown',e=>{e.preventDefault();
    S.colorPageIdx=(S.colorPageIdx-1+CPAGES.length)%CPAGES.length;renderColorPage();});
  document.getElementById('color-next').addEventListener('pointerdown',e=>{e.preventDefault();
    S.colorPageIdx=(S.colorPageIdx+1)%CPAGES.length;renderColorPage();});
  document.getElementById('color-clear').addEventListener('pointerdown',e=>{e.preventDefault();
    Object.keys(S.regionFills).forEach(k=>{if(k.startsWith(S.colorPageIdx+'-'))delete S.regionFills[k];});renderColorPage();});
  document.getElementById('color-back').addEventListener('pointerdown',e=>{e.preventDefault();showScreen('home');});
}

// ===== TIMER =====
function startTimer(){if(S.timerInt)clearInterval(S.timerInt);S.timerEnd=Date.now()+S.timerMin*60000;S.timerRunning=true;
  const el=document.getElementById('timer-display');el.style.display='inline';
  S.timerInt=setInterval(()=>{const rem=Math.max(0,S.timerEnd-Date.now());
    el.textContent='⏱️ '+Math.floor(rem/60000)+':'+String(Math.floor((rem%60000)/1000)).padStart(2,'0');
    if(rem<=0){clearInterval(S.timerInt);S.timerRunning=false;timesUp();}},1000);}
function timesUp(){if(S.timerInt)clearInterval(S.timerInt);S.timerRunning=false;
  document.getElementById('timer-display').style.display='none';
  document.getElementById('final-score').textContent='You earned ⭐ '+S.score+' stars!';
  showScreen('timesup');say('All done! Great job today Hailey!');}

function makeFloaters(){const em=['☁️','⭐','💫','🌟','✨'];
  for(let i=0;i<5;i++){const d=document.createElement('div');d.className='floater';d.textContent=pick(em);
    d.style.left=Math.random()*100+'%';d.style.fontSize=(Math.random()*14+12)+'px';
    d.style.animationDuration=(Math.random()*12+16)+'s';d.style.animationDelay=(-Math.random()*20)+'s';document.body.appendChild(d);}}

// ===== INIT =====
function init(){renderHome();makeFloaters();initDraw();initColoring();
  document.getElementById('back-btn').addEventListener('pointerdown',e=>{e.preventDefault();
    document.getElementById('timer-display').style.display='none';showScreen('home');});
  document.getElementById('timer-btn').addEventListener('pointerdown',e=>{e.preventDefault();
    document.getElementById('timer-modal').style.display='flex';});
  document.querySelectorAll('.timer-opt').forEach(b=>{b.addEventListener('pointerdown',e=>{e.preventDefault();
    S.timerMin=parseInt(b.dataset.minutes);document.querySelectorAll('.timer-opt').forEach(x=>x.classList.remove('selected'));
    b.classList.add('selected');setTimeout(()=>document.getElementById('timer-modal').style.display='none',250);});});
  document.querySelectorAll('.diff-btn').forEach(b=>{b.addEventListener('pointerdown',e=>{e.preventDefault();
    S.difficulty=b.dataset.diff;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');});});
  document.getElementById('modal-close-btn').addEventListener('pointerdown',e=>{e.preventDefault();
    document.getElementById('timer-modal').style.display='none';});
  document.getElementById('play-again-btn').addEventListener('pointerdown',e=>{e.preventDefault();S.timerRunning=false;showScreen('home');});
}
document.addEventListener('DOMContentLoaded',init);
</script>
